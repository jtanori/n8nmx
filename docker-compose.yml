version: '3.8'

services:
  # Base de Datos: El corazón de la persistencia
  db:
    image: postgres:15-alpine
    container_name: sonora_engine_db
    restart: always
    environment:
      POSTGRES_USER: ${PGUSER:-admin}
      POSTGRES_PASSWORD: ${PGPASSWORD:-secret}
      POSTGRES_DB: ${PGDATABASE:-prospector_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - ./packages/db-schema/migrations:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-admin}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Automatización: Motor n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: sonora_engine_n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${PGDATABASE:-prospector_db}
      - DB_POSTGRESDB_USER=${PGUSER:-admin}
      - DB_POSTGRESDB_PASSWORD=${PGPASSWORD:-secret}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=${N8N_PORT:-5678}
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
    depends_on:
      db:
        condition: service_healthy

  # Dashboard: Next.js UI
  dashboard:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sonora_engine_ui
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://${PGUSER}:${PGPASSWORD}@db:5432/${PGDATABASE}
    depends_on:
      db:
        condition: service_healthy

  # Migrador de esquemas
  migrator:
    image: postgres:15-alpine
    volumes:
      - ./packages/db-schema:/db-schema
    environment:
      - DATABASE_URL=postgresql://${PGUSER}:${PGPASSWORD}@db:5432/${PGDATABASE}
    command: >
      sh -c "apk add --no-cache postgresql-client && /db-schema/migrate.sh $$DATABASE_URL"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
